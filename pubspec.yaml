name: gomhor_alahly_clean_new
description: "تطبيق احترافي لجمهور نادي الأهلي المصري مع Firebase و TheSportDB API"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Firebase Ecosystem (Updated) ---
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_database: ^10.3.5
  firebase_storage: ^11.6.9
  cloud_functions: ^4.6.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^17.2.3

  # --- Media & UI Elements ---
  video_player: ^2.9.2
  chewie: ^1.8.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  visibility_detector: ^0.4.0+2
  confetti: ^0.7.0
  cloudinary_flutter: ^1.3.0
  shimmer: ^3.0.0

  # --- Icons & Fonts ---
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  google_fonts: ^6.1.0
  google_sign_in: ^6.2.11

  # --- State Management & Logic ---
  provider: ^6.1.1
  flutter_bloc: ^8.1.5
  bloc: ^8.1.2
  equatable: ^2.0.5
  uuid: ^4.0.0
  dartz: ^0.10.1
  get_it: ^7.6.6

  # --- Networking & Data ---
  dio: ^5.4.0
  http: ^1.1.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  url_launcher: ^6.2.5

  # --- Utils & Sharing ---
  share_plus: ^7.2.1
  animate_do: ^3.3.4
  flutter_animate: ^4.5.2
  gal: ^2.2.7

  # --- AI & Advanced Features ---
  google_generative_ai: ^0.4.3

  # --- Database & Local Storage ---
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2

  # --- Additional Utilities ---
  connectivity_plus: ^5.0.2
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1
  sensors_plus: ^6.1.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  smooth_page_indicator: ^1.1.0
  cloudinary_public: ^0.23.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter
  build_runner: ^2.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/